name: YouTube → Telegram Automation

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  video_notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get latest YouTube upload
        id: youtube
        run: |
          FEED_URL="https://www.youtube.com/feeds/videos.xml?channel_id=UCUOQQgxMLp0MaJL2NJ8Vl2g"
          RESPONSE=$(curl -s "$FEED_URL")

          VIDEO_ID=$(echo "$RESPONSE" | grep -oPm1 "(?<=<yt:videoId>)[^<]+")
          VIDEO_TITLE=$(echo "$RESPONSE" | grep -oP '(?<=<title>).*?(?=</title>)' | sed -n '2p')

          if [ -z "$VIDEO_ID" ]; then
            echo "video_id=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "video_id=$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "video_title=$VIDEO_TITLE" >> $GITHUB_OUTPUT

      - name: Read last posted video
        id: last
        run: |
          if [ -f last_video.txt ]; then
            LAST=$(cat last_video.txt)
          else
            LAST="none"
          fi

          echo "last_video=$LAST" >> $GITHUB_OUTPUT

      - name: Send video to Telegram
        if: steps.youtube.outputs.video_id != 'none' && steps.youtube.outputs.video_id != steps.last.outputs.last_video
        run: |

          VIDEO_ID="${{ steps.youtube.outputs.video_id }}"
          TITLE="${{ steps.youtube.outputs.video_title }}"

          URL="https://youtu.be/$VIDEO_ID"

          MAXRES="https://img.youtube.com/vi/$VIDEO_ID/maxresdefault.jpg"
          HQ="https://img.youtube.com/vi/$VIDEO_ID/hqdefault.jpg"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $MAXRES)

          if [ "$STATUS" = "200" ]; then
            THUMB=$MAXRES
          else
            THUMB=$HQ
          fi

          echo "$VIDEO_ID" > last_video.txt

          CAPTION="<b><a href=\"$URL\">$TITLE</a></b>

🔥 New upload is live!
👇 Tap below to watch 👇"

          BUTTON='{"inline_keyboard":[[{"text":"▶️ Watch on YouTube","url":"'"$URL"'"}]]}'

          echo "Posting to PUBLIC topic"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
          -d chat_id="-1002447950632" \
          -d message_thread_id="6215" \
          -d photo="$THUMB" \
          -d caption="$CAPTION" \
          -d parse_mode="HTML" \
          -d reply_markup="$BUTTON"

          echo "Posting to PRIVATE topic"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
          -d chat_id="-1002176152174" \
          -d message_thread_id="2717" \
          -d photo="$THUMB" \
          -d caption="$CAPTION" \
          -d parse_mode="HTML" \
          -d reply_markup="$BUTTON"

      - name: Save last video
        if: steps.youtube.outputs.video_id != 'none' && steps.youtube.outputs.video_id != steps.last.outputs.last_video
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_video.txt
          git commit -m "Update last video" || echo "No changes"
          git push
