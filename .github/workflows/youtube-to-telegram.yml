name: YouTube to Telegram

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest YouTube video details
        id: youtube
        run: |
          FEED_URL="https://www.youtube.com/feeds/videos.xml?channel_id=UCUOQQgxMLp0MaJL2NJ8Vl2g"
          RESPONSE=$(curl -s "$FEED_URL")

          VIDEO_ID=$(echo "$RESPONSE" | sed -n 's:.*<yt:videoId>\(.*\)</yt:videoId>.*:\1:p' | head -n 1)
          VIDEO_TITLE=$(echo "$RESPONSE" | sed -n 's:.*<title>\(.*\)</title>.*:\1:p' | sed -n '2p')

          if [ -z "$VIDEO_ID" ]; then
            echo "No video found."
            echo "video_id=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "video_id=$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "video_title=$VIDEO_TITLE" >> $GITHUB_OUTPUT

      - name: Read last posted video
        id: last
        run: |
          if [ -f last_video.txt ]; then
            LAST_VIDEO=$(cat last_video.txt)
          else
            LAST_VIDEO="none"
          fi
          echo "last_video=$LAST_VIDEO" >> $GITHUB_OUTPUT

      - name: Send to Telegram if new
        if: steps.youtube.outputs.video_id != 'none' && steps.youtube.outputs.video_id != steps.last.outputs.last_video
        run: |
          VIDEO_ID="${{ steps.youtube.outputs.video_id }}"
          VIDEO_TITLE="${{ steps.youtube.outputs.video_title }}"
          VIDEO_URL="https://youtu.be/$VIDEO_ID"
          THUMB_URL="https://img.youtube.com/vi/$VIDEO_ID/hqdefault.jpg"

          CAPTION="<b>$VIDEO_TITLE</b>%0A%0A🔥 New upload is live!%0A👇 Watch now 👇"

          echo "Sending to PUBLIC group..."
          RESPONSE1=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -d chat_id="${{ secrets.PUBLIC_CHAT_ID }}" \
            -d photo="$THUMB_URL" \
            -d caption="$CAPTION" \
            -d parse_mode="HTML")

          echo "$RESPONSE1"

          echo "Sending to PRIVATE group..."
          RESPONSE2=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -d chat_id="${{ secrets.PRIVATE_CHAT_ID }}" \
            -d photo="$THUMB_URL" \
            -d caption="$CAPTION" \
            -d parse_mode="HTML")

          echo "$RESPONSE2"

          echo "$VIDEO_ID" > last_video.txt

      - name: Save last video
        if: steps.youtube.outputs.video_id != 'none' && steps.youtube.outputs.video_id != steps.last.outputs.last_video
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_video.txt
          git commit -m "Update last video" || echo "No changes"
          git push
