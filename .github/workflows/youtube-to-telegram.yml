name: YouTube to Telegram Automation

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: youtube-telegram-automation
  cancel-in-progress: false

jobs:
  video_notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Ensure state files exist
        run: |
          [ -f last_video.txt ] || echo "none" > last_video.txt
          [ -f posted_videos.txt ] || touch posted_videos.txt
          [ -f last_subs.txt ] || echo "0" > last_subs.txt

      - name: Get latest YouTube upload
        id: youtube
        run: |
          FEED_URL="https://www.youtube.com/feeds/videos.xml?channel_id=UCUOQQgxMLp0MaJL2NJ8Vl2g"
          RESPONSE=$(curl -sL "$FEED_URL")

          if [ -z "$RESPONSE" ]; then
            echo "video_id=none" >> "$GITHUB_OUTPUT"
            echo "video_title=No title" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VIDEO_ID=$(echo "$RESPONSE" | grep -oPm1 "(?<=<yt:videoId>)[^<]+" || true)
          VIDEO_TITLE=$(echo "$RESPONSE" | grep -oP '(?<=<title>).*?(?=</title>)' | sed -n '2p' || true)

          if [ -z "$VIDEO_ID" ]; then
            echo "video_id=none" >> "$GITHUB_OUTPUT"
            echo "video_title=No title" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest YouTube VIDEO_ID: $VIDEO_ID"
          echo "Latest YouTube TITLE: $VIDEO_TITLE"

          echo "video_id=$VIDEO_ID" >> "$GITHUB_OUTPUT"

          echo "video_title<<EOF" >> "$GITHUB_OUTPUT"
          echo "$VIDEO_TITLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Read last posted video
        id: last
        run: |
          LAST=$(cat last_video.txt 2>/dev/null || echo "none")
          echo "Last saved VIDEO_ID: $LAST"
          echo "last_video=$LAST" >> "$GITHUB_OUTPUT"

      - name: Check posted history
        id: history
        run: |
          VIDEO_ID="${{ steps.youtube.outputs.video_id }}"

          if [ "$VIDEO_ID" = "none" ] || [ -z "$VIDEO_ID" ]; then
            echo "already_posted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Fxq "$VIDEO_ID" posted_videos.txt; then
            echo "Video found in posted_videos.txt history."
            echo "already_posted=true" >> "$GITHUB_OUTPUT"
          else
            echo "Video NOT found in posted_videos.txt history."
            echo "already_posted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect video type
        id: info
        run: |
          VIDEO_ID="${{ steps.youtube.outputs.video_id }}"

          if [ "$VIDEO_ID" = "none" ] || [ -z "$VIDEO_ID" ]; then
            echo "type=VIDEO" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PAGE=$(curl -sL "https://www.youtube.com/watch?v=$VIDEO_ID")
          DURATION_MS=$(echo "$PAGE" | grep -oP '(?<=approxDurationMs":")[0-9]+' | head -n 1 || true)

          if [ -z "$DURATION_MS" ]; then
            TYPE="VIDEO"
          elif [ "$DURATION_MS" -le 180000 ]; then
            TYPE="SHORT"
          else
            TYPE="VIDEO"
          fi

          echo "Detected type: $TYPE"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"

      - name: Skip if already posted
        if: steps.youtube.outputs.video_id == steps.last.outputs.last_video || steps.history.outputs.already_posted == 'true'
        run: |
          echo "This video was already posted. Skipping Telegram send."

      - name: Send video to Telegram and save state
        if: steps.youtube.outputs.video_id != 'none' && steps.youtube.outputs.video_id != steps.last.outputs.last_video && steps.history.outputs.already_posted != 'true'
        run: |
          set -e

          VIDEO_ID="${{ steps.youtube.outputs.video_id }}"
          TITLE="${{ steps.youtube.outputs.video_title }}"
          TYPE="${{ steps.info.outputs.type }}"
          URL="https://youtu.be/$VIDEO_ID"

          echo "Posting NEW video: $VIDEO_ID"
          echo "Title: $TITLE"
          echo "Type: $TYPE"

          MAXRES="https://img.youtube.com/vi/$VIDEO_ID/maxresdefault.jpg"
          HQ="https://img.youtube.com/vi/$VIDEO_ID/hqdefault.jpg"

          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" "$MAXRES")

          if [ "$STATUS" = "200" ]; then
            THUMB="$MAXRES"
          else
            THUMB="$HQ"
          fi

          BUTTON='{"inline_keyboard":[[{"text":"▶ Watch on YouTube","url":"'"$URL"'"}]]}'

          if [ "$TYPE" = "SHORT" ]; then
            CAPTION=$(printf '%s\n\n🔥 New Short is live!\n👇 Tap below to watch 👇' "$TITLE")
          else
            CAPTION=$(printf '%s\n\n🔥 New upload is live!\n👇 Tap below to watch 👇' "$TITLE")
          fi

          RESP1=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -d chat_id="-1002447950632" \
            -d message_thread_id="6215" \
            -d photo="$THUMB" \
            --data-urlencode caption="$CAPTION" \
            -d reply_markup="$BUTTON")

          echo "Telegram Response 1:"
          echo "$RESP1"
          echo "$RESP1" | grep -q '"ok":true' || exit 1

          RESP2=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -d chat_id="-1002176152174" \
            -d message_thread_id="2717" \
            -d photo="$THUMB" \
            --data-urlencode caption="$CAPTION" \
            -d reply_markup="$BUTTON")

          echo "Telegram Response 2:"
          echo "$RESP2"
          echo "$RESP2" | grep -q '"ok":true' || exit 1

          echo "Both Telegram posts succeeded. Saving state..."
          echo "$VIDEO_ID" > last_video.txt

          if ! grep -Fxq "$VIDEO_ID" posted_videos.txt; then
            echo "$VIDEO_ID" >> posted_videos.txt
          fi

          echo "Saved last_video.txt:"
          cat last_video.txt

          echo "Saved posted_videos.txt:"
          cat posted_videos.txt

      - name: Commit and push video state
        if: steps.youtube.outputs.video_id != 'none' && steps.youtube.outputs.video_id != steps.last.outputs.last_video && steps.history.outputs.already_posted != 'true'
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main
          git checkout main
          git pull --rebase origin main

          git add last_video.txt posted_videos.txt

          if git diff --cached --quiet; then
            echo "No changes to commit for video state files."
          else
            git commit -m "Update video state to ${{ steps.youtube.outputs.video_id }}"
            git push origin main
            echo "Video state files pushed successfully."
          fi

  subscriber_milestones:
    needs: video_notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Ensure subscriber state file exists
        run: |
          [ -f last_subs.txt ] || echo "0" > last_subs.txt

      - name: Get subscriber count
        id: subs
        run: |
          PAGE=$(curl -sL "https://www.youtube.com/@LastStandEcho")

          if [ -z "$PAGE" ]; then
            echo "subs=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SUBS=$(echo "$PAGE" | grep -oP '(?<=subscriberCountText":{"simpleText":")[^ ]+' | head -n 1 || true)

          if [ -z "$SUBS" ]; then
            echo "subs=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NUM=$(echo "$SUBS" | sed 's/K/*1000/' | sed 's/M/*1000000/' | bc)

          echo "Current subscribers: $NUM"
          echo "subs=$NUM" >> "$GITHUB_OUTPUT"

      - name: Read last subs
        id: last
        run: |
          LAST=$(cat last_subs.txt 2>/dev/null || echo "0")
          echo "Last saved subscribers: $LAST"
          echo "last=$LAST" >> "$GITHUB_OUTPUT"

      - name: Check milestone
        id: check
        run: |
          CURRENT=${{ steps.subs.outputs.subs }}
          LAST=${{ steps.last.outputs.last }}

          MILESTONE="none"

          if [ "$LAST" -lt 1000 ] && [ "$CURRENT" -ge 1000 ]; then
            MILESTONE="1K"
          elif [ "$LAST" -lt 5000 ] && [ "$CURRENT" -ge 5000 ]; then
            MILESTONE="5K"
          elif [ "$LAST" -lt 10000 ] && [ "$CURRENT" -ge 10000 ]; then
            MILESTONE="10K"
          fi

          echo "Milestone check result: $MILESTONE"
          echo "milestone=$MILESTONE" >> "$GITHUB_OUTPUT"

      - name: Send milestone message
        if: steps.check.outputs.milestone != 'none'
        run: |
          set -e

          MILESTONE="${{ steps.check.outputs.milestone }}"

          TEXT=$(printf '🎉 SUBSCRIBER MILESTONE\n\n🔥 We just crossed %s subscribers!\n\nThank you for supporting Last Stand Echo.' "$MILESTONE")

          RESP=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="-1002447950632" \
            -d message_thread_id="6215" \
            --data-urlencode text="$TEXT")

          echo "$RESP"
          echo "$RESP" | grep -q '"ok":true' || exit 1

      - name: Save subscriber count
        run: |
          set -e

          SUBS="${{ steps.subs.outputs.subs }}"

          if [ -z "$SUBS" ] || [ "$SUBS" = "0" ]; then
            echo "Subscriber count invalid or zero. Skipping save to avoid corrupting state."
            exit 0
          fi

          echo "$SUBS" > last_subs.txt

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main
          git checkout main
          git pull --rebase origin main

          git add last_subs.txt

          if git diff --cached --quiet; then
            echo "No changes to commit for last_subs.txt"
          else
            git commit -m "Update subs to $SUBS"
            git push origin main
            echo "last_subs.txt pushed successfully."
          fi
